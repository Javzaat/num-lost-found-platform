spring.application.name=api-gateway
server.port=${SERVER_PORT:8080}

management.endpoints.web.exposure.include=health,info

# =========================
# Service Routes
# =========================

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=item-service
spring.cloud.gateway.routes[1].uri=${ITEM_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/items/**

spring.cloud.gateway.routes[2].id=matching-service
spring.cloud.gateway.routes[2].uri=${MATCHING_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/matches/**

spring.cloud.gateway.routes[3].id=claim-service
spring.cloud.gateway.routes[3].uri=${CLAIM_SERVICE_URL:http://localhost:8084}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/claims/**

spring.cloud.gateway.routes[4].id=file-service
spring.cloud.gateway.routes[4].uri=${FILE_SERVICE_URL:http://localhost:8085}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/files/**

# =========================
# CORS for React Frontend
# =========================

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=false
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_FIRST
