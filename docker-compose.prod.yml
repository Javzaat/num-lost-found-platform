services:
  auth-service:
    build: ./auth-service
    container_name: num-auth-service
    environment:
      - SERVER_PORT=8081
    restart: unless-stopped

  item-service:
    build: ./item-service
    container_name: num-item-service
    environment:
      - SERVER_PORT=8082
    restart: unless-stopped

  matching-service:
    build: ./matching-service
    container_name: num-matching-service
    environment:
      - SERVER_PORT=8083
      - ITEM_SERVICE_URL=http://item-service:8082
    depends_on:
      - item-service
    restart: unless-stopped

  claim-service:
    build: ./claim-service
    container_name: num-claim-service
    environment:
      - SERVER_PORT=8084
    depends_on:
      - item-service
      - matching-service
    restart: unless-stopped

  file-service:
    build: ./file-service
    container_name: num-file-service
    environment:
      - SERVER_PORT=8085
      - UPLOAD_DIR=/app/uploads
    volumes:
      - file-uploads:/app/uploads
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: num-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - AUTH_SERVICE_URL=http://auth-service:8081
      - ITEM_SERVICE_URL=http://item-service:8082
      - MATCHING_SERVICE_URL=http://matching-service:8083
      - CLAIM_SERVICE_URL=http://claim-service:8084
      - FILE_SERVICE_URL=http://file-service:8085
      - ALLOWED_ORIGINS=http://YOUR_DROPLET_IP
    depends_on:
      - auth-service
      - item-service
      - matching-service
      - claim-service
      - file-service
    restart: unless-stopped

  frontend-app:
    build:
      context: ./frontend-app
      args:
        - VITE_API_BASE_URL=http://YOUR_DROPLET_IP:8080
    container_name: num-frontend-app
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  file-uploads:
